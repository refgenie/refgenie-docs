plugins:
  - mkdocs-jupyter:
      include:
        - refget/using-services/getting-started.py
        - refget/using-services/sequence-client.ipynb
        - refget/using-services/seqcol-client.ipynb
        - refget/hosting-services/agent.ipynb
        - refget/using-services/digests.ipynb
        - refget/using-services/refgetstore.py
        - refget/using-services/seqcol-operations.py
        - refget/using-services/aliases.py
        - refget/using-services/fhr-metadata.py
        - refget/using-services/genome-store.py
        - legacy/refgenie/notebooks/aliases.ipynb
        - legacy/refgenie/notebooks/config_upgrade_03_to_04.ipynb
        - legacy/refgenie/notebooks/refgenconf_usage.ipynb
        - legacy/refgenie/notebooks/tutorial.ipynb
        - refgenie/notebooks/refgenie.ipynb
      ignore_h1_titles: True
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google # Default to Google style
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_root_heading: true
            show_root_full_path: false
            show_source: true # Optional: Show source code links
            show_signature: true # Show method signatures
            show_if_no_docstring: false
            docstring_section_style: table # Optional: Format style
            separate_signature: true # Ensure __init__ appears clearly
            merge_init_into_class: true # This ensures __init__ is documented
            allow_inspection: true # Enable runtime inspection for compiled extensions

