site_name: "Refgenie: next-generation reference genome management"
repo_url: https://github.com/refgenie/refgenie-docs
repo_name: refgenie/refgenie-docs
edit_uri: edit/master/docs/

theme:
  logo: img/refgenie_bug_light.svg
  favicon: img/refgenie_bug.svg
  name: material
  custom_dir: overrides
  features:
    - header.autohide
    - navigation.sections
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - content.action.edit
    - content.action.view
    - navigation.tabs
    - navigation.top

markdown_extensions:
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - stylesheets/extra.css

extra:
  generator: false # turn off theme link

copyright: >
  <a class="" href="http://databio.org/">
    <img src="https://databio.org/images/logo/logo_databio_long.svg"
      style="height:60px;"
      alt="Databio logo">
  </a>

